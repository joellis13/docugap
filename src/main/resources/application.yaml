spring:
  application:
    name: docugap

  ai:

    # Anthropic Claude
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:FAKE_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4000

    # Azure AI Foundry
    azure:
      openai:
        api-key: ${AZURE_OPENAI_API_KEY:FAKE_KEY}
        endpoint: ${AZURE_OPENAI_ENDPOINT:}
        chat:
          options:
            deployment-name: ${AZURE_DEPLOYMENT_NAME:}

    # MCP client streamable-HTTP connections
    # Both servers are always registered; the pipeline uses both.
    mcp:
      client:
        enabled: true
        request-timeout: 30s
        type: SYNC
        streamable:
          http:
            connections:
              atlassian:
                url: https://mcp.atlassian.com/v1/mcp
              github:
                url: https://api.githubcopilot.com/mcp

# DocuGap pipeline configuration
docugap:

  llm:
    # Switch between 'anthropic' and 'azure' with no code changes required.
    provider: anthropic

  pipeline:
    # Maximum number of epics to analyze in a single run.
    max-epics-per-run: 10
    # Epics closed more than this many days ago are skipped.
    epic-lookback-days: 180
    # When true, pipeline pauses after Phase 5 and waits for POST /gaps/approve.
    # Set to false to auto-approve all candidates (not recommended in production).
    pause-for-approval: true

  atlassian:
    cloud-id: d6b5b659-1fa8-4883-a30f-e038eec6359d
    jira-project-key: DGAP
    confluence-space-key: DGAP
    # Page ID of the Gap Analysis Session Log page in Confluence.
    session-log-page-id: "6094849"

  github:
    # Default repository to analyze. Can be overridden per-run via the REST API.
    default-repo: ${GITHUB_DEFAULT_REPO:}

  output:
    # Console output — always on during development.
    console: true
    # Write PipelineResult as JSON to json-path after each run.
    json: true
    json-path: ./output/
    # Disable Confluence writes until the pipeline is stable end-to-end.
    confluence: false

  scheduler:
    # Set to false to disable scheduled runs during development.
    enabled: false
    # Cron expression — only evaluated when enabled: true.
    # Example: "0 0 9 * * MON" runs every Monday at 9am.
    cron: "0 0 9 * * MON"
    default-project-key: DGAP
    default-space-key: DGAP

# SpringDoc / Swagger UI
springdoc:
  swagger-ui:
    path: /
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs
  show-actuator: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.jellisisland.docugap: DEBUG
    org.springframework.ai: INFO